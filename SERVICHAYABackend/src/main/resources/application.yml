spring:
  application:
    name: servichaya-backend
  
  datasource:
    url: jdbc:mysql://localhost:3306/servichaya?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  
  jpa:
    hibernate:
      ddl-auto: update  # Schema managed by JPA
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false
        use_sql_comments: true
    open-in-view: false
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  
  cache:
    type: simple
    cache-names:
      - providers
      - services
      - matchingRules
      - businessRules

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:servichaya-secret-key-change-in-production}
  expiration: 86400000 # 24 hours

# OTP Configuration
otp:
  expiration: 300000 # 5 minutes
  length: 6

# RazorPay Configuration
razorpay:
  key:
    id: ${RAZORPAY_KEY_ID:your_razorpay_key_id}
    secret: ${RAZORPAY_KEY_SECRET:your_razorpay_key_secret}

# OTP Service (Twilio/MessageBird)
otp-service:
  api-key: ${OTP_SERVICE_API_KEY:your_otp_api_key}
  api-secret: ${OTP_SERVICE_API_SECRET:your_otp_api_secret}
  provider: ${OTP_SERVICE_PROVIDER:twilio} # twilio or messagebird

# Server Configuration
server:
  port: 8080
  servlet:
    context-path: /api

# Logging
logging:
  level:
    root: INFO
    com.servichaya: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# OpenAPI Documentation
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
